  <!-- 効果音（Web Audio API）の管理用JS -->
  <script>
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
      if (ctx.state === 'suspended') {
        ctx.resume();
      }
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      } else if (type === 'pop') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
        osc.start();
        osc.stop(ctx.currentTime + 0.08);
      } else if (type === 'steam') {
        const bufferSize = ctx.sampleRate * 0.1;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1000;
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.05, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        noise.start();
      } else if (type === 'rustle') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } else if (type === 'success') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
        osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
        osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
        osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3); // C6
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } else if (type === 'pour') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      }
    }
  </script>

    // 画面切り替えの処理

      if (currentPage < pages.length - 1) {
        currentPage++;
        renderPage();

        currentPage--;
        renderPage();

      currentPage = 0;

    // 1. 茶摘みアクション
    function pickLeaf(leafId) {
      const leaf = document.getElementById(leafId);
      if (!leaf || leaf.classList.contains('picked')) return;

      playSound('pop');
      leaf.classList.add('picked');
      
      // かご（右下）に確実に吸い込まれるように、新芽ごとに最適化した軌道をマッピング
      let translationValue = 'translate(100px, 120px) scale(0.2)';
      if (leafId === 'leaf-1') {
        translationValue = 'translate(179px, 116px) scale(0.2)';
      } else if (leafId === 'leaf-2') {
        translationValue = 'translate(104px, 140px) scale(0.2)';
      } else if (leafId === 'leaf-3') {
        translationValue = 'translate(29px, 116px) scale(0.2)';
      }
      
      leaf.style.transform = translationValue;
      leaf.style.opacity = '0';
      
      gameStats.leavesPicked++;

      // かごの中に葉っぱが現れるビジュアル演出
      const basketLeaf = document.getElementById(`basket-leaf-${gameStats.leavesPicked}`);
      if (basketLeaf) {
        basketLeaf.classList.remove('hidden');
      }

      const remaining = 3 - gameStats.leavesPicked;
      const countLabel = document.getElementById('leaf-count');
      if (countLabel) {
        countLabel.textContent = remaining;
      }

      if (gameStats.leavesPicked >= 3) {
        playSound('success');
        const nextBtn = document.getElementById('btn-next');
        if (nextBtn) {
          nextBtn.disabled = false;
          nextBtn.className = "bg-[#81c784] text-white font-bold px-8 py-2 rounded-full border-b-4 border-[#4caf50] active:translate-y-1 active:border-b-0 transition-all flex-grow max-w-[150px]";
          nextBtn.onclick = () => { playSound('click'); nextPage(); };
        }
      }
    }

          'M50,10 C35,35 35,65 50,90 C65,65 65,35 50,10 Z', // 4
          'M50,10 C38,35 38,65 50,90 C62,65 62,35 50,10 Z', // 5
          'M50,10 C41,35 41,65 50,90 C59,65 59,35 50,10 Z', // 6
          'M50,10 C44,35 44,65 50,90 C56,65 56,35 50,10 Z', // 7
          'M50,10 C47,35 47,65 50,90 C53,65 53,35 50,10 Z'  // 8: 100%（一番細い！）
        ];
        const colors = [
          '#4caf50', // 0
          '#45a247', // 1
          '#3b953d', // 2
          '#328834', // 3
          '#2e7d32', // 4
          '#257029', // 5
          '#1b6420', // 6
          '#125717', // 7
          '#1b5e20'  // 8 (一番濃く、一番細いお茶っぱに)
        ];
        path.setAttribute('d', paths[gameStats.rubProgress]);
        path.setAttribute('fill', colors[gameStats.rubProgress]);
      }

      // 1回タップするごとに縦軸(Y軸)を中心に180度くるくると3D回転させるアニメーション
      const leafSvg = document.getElementById('rubbing-leaf-svg');
      if (leafSvg) {
        const angle = gameStats.rubProgress * 180;
        leafSvg.style.transform = `rotateY(${angle}deg) scale(0.95)`;
        setTimeout(() => {
          leafSvg.style.transform = `rotateY(${angle}deg) scale(1)`;
        }, 150);
      }

      if (gameStats.rubProgress >= 8) {
        playSound('success');
        const nextBtn = document.getElementById('btn-next');
        if (nextBtn) {
          nextBtn.disabled = false;
          nextBtn.className = "bg-[#81c784] text-white font-bold px-8 py-2 rounded-full border-b-4 border-[#4caf50] active:translate-y-1 active:border-b-0 transition-all flex-grow max-w-[150px]";
          nextBtn.onclick = () => { playSound('click'); nextPage(); };
        }
      }
    }

    // 4. 乾燥アクション（ドライヤーで熱風乾燥：縦位置調整済み）
    function dryAction() {
      if (gameStats.dryProgress >= 100) return;

      playSound('steam'); // 風の代用音
      gameStats.dryProgress += 20;
      if (gameStats.dryProgress > 100) gameStats.dryProgress = 100;

      const text = document.getElementById('dry-percentage');
      if (text) text.textContent = gameStats.dryProgress;
      const bar = document.getElementById('dry-bar');
      if (bar) bar.style.width = gameStats.dryProgress + '%';

      // ドライヤーの揺れ動き
      const dryer = document.getElementById('dryer-icon');
      if (dryer) {
        dryer.style.transform = 'rotate(-10deg) scale(1.05)';
        setTimeout(() => {
          dryer.style.transform = 'rotate(5deg)';
        }, 150);
      }

      // 赤とオレンジ色のグラデーション熱風エフェクト（お茶の葉の位置に当たるよう移動量を調整）
      const wind = document.getElementById('wind-effect');
      if (wind) {
        wind.style.background = 'linear-gradient(to left, rgba(255, 87, 34, 0.8), rgba(255, 152, 0, 0.15))';
        wind.style.opacity = '0.8';
        wind.style.transform = 'translateX(-90px) scaleY(1.3)';
        setTimeout(() => {
          wind.style.opacity = '0';
          wind.style.transform = 'translateX(0) scaleY(1)';
        }, 300);
      }

      const dryLeafPath = document.getElementById('dry-leaf-path');
      const dryingLeafDiv = document.getElementById('drying-leaf');
      if (dryLeafPath && dryingLeafDiv) {
        if (gameStats.dryProgress >= 100) {
          dryingLeafDiv.style.transform = 'scale(0.7)';
          dryLeafPath.setAttribute('fill', '#1b5e20');
        } else if (gameStats.dryProgress >= 50) {
          dryingLeafDiv.style.transform = 'scale(0.85)';
        }
      }

      if (gameStats.dryProgress >= 100) {
        playSound('success');
        const nextBtn = document.getElementById('btn-next');
        if (nextBtn) {
          nextBtn.disabled = false;
          nextBtn.className = "bg-[#81c784] text-white font-bold px-8 py-2 rounded-full border-b-4 border-[#4caf50] active:translate-y-1 active:border-b-0 transition-all flex-grow max-w-[150px]";
          nextBtn.onclick = () => { playSound('click'); nextPage(); };
        }
      }
    }

    // 5. お茶をいれるアクション（右へ傾ける急須＆クリップパスによるお茶の蓄積）
    function pourAction() {
      if (gameStats.pourProgress >= 100) return;

      playSound('pour');
      gameStats.pourProgress += 25;
      if (gameStats.pourProgress > 100) gameStats.pourProgress = 100;

      const pot = document.getElementById('teapot-container');
      if (pot) {
        // 右側（時計回り）に35度傾ける
        pot.style.transform = 'rotate(35deg)';
      }

      const stream = document.getElementById('tea-stream');
      if (stream) {
        stream.style.opacity = '1';
      }

      const tea = document.getElementById('tea-inside');
      if (tea) {
        // y座標を105（空っぽ）から、注ぐにつれて徐々に上に上げる（満杯時30付近まで上昇）
        const yCoord = 105 - (gameStats.pourProgress * 0.75);
        tea.setAttribute('y', yCoord);
      }

      setTimeout(() => {
        if (pot) pot.style.transform = 'rotate(0deg)';
        if (stream) stream.style.opacity = '0';
      }, 500);

      const status = document.getElementById('pour-status');
      if (status) {
        if (gameStats.pourProgress >= 100) {
          status.textContent = 'まんぷく！';
          status.className = 'text-base text-green-600 font-bold';
        } else if (gameStats.pourProgress >= 50) {
          status.textContent = 'はんぶん！';
        }
      }

      if (gameStats.pourProgress >= 100) {
        setTimeout(() => {
          playSound('success');
          const nextBtn = document.getElementById('btn-next');
          if (nextBtn) {
            nextBtn.disabled = false;
            nextBtn.className = "bg-[#81c784] text-white font-bold px-8 py-2 rounded-full border-b-4 border-[#4caf50] active:translate-y-1 active:border-b-0 transition-all flex-grow max-w-[150px]";
            nextBtn.onclick = () => { playSound('click'); nextPage(); };
          }
        }, 600);
      }
    }

    window.onload = function() {
      renderPage();
    };
  </script>
</body>
</html>
